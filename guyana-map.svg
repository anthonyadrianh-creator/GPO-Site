<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="800" fill="#1a4d4d"/>

  <!-- Water/Ocean -->
  <rect x="0" y="0" width="600" height="150" fill="#0d3d3d"/>

  <!-- Surrounding Countries Background -->
  <g opacity="0.3">
    <!-- Venezuela (top left) -->
    <path d="M 80 200 L 180 150 L 200 280 L 120 300 Z" fill="#d4a017"/>
    <!-- Brazil (right side) -->
    <path d="M 380 250 L 550 200 L 600 400 L 500 450 Z" fill="#d4a017"/>
    <!-- Suriname (right) -->
    <path d="M 410 350 L 480 320 L 500 450 L 420 480 Z" fill="#d4a017"/>
  </g>

  <!-- Labels for surrounding countries -->
  <text x="140" y="240" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#999999" text-anchor="middle">VENEZUELA</text>
  <text x="480" y="340" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#999999" text-anchor="middle">BRAZIL</text>
  <text x="450" y="420" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#999999" text-anchor="middle">SURINAME</text>

  <!-- GUYANA - Main Country -->
  <path d="M 180 150 L 380 120 L 420 280 L 400 500 L 200 520 L 150 350 Z" fill="#2a6a6a" stroke="#d4a017" stroke-width="2"/>

  <!-- Guyana Label -->
  <text x="290" y="350" font-family="Playfair Display, serif" font-size="28" font-weight="700" fill="#d4a017" text-anchor="middle" opacity="0.8">GUYANA</text>

  <!-- Essequibo River (prominent feature) -->
  <path d="M 220 130 Q 210 250 200 400 Q 195 550 185 650" stroke="#4da6a6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
  <text x="155" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4da6a6">Essequibo River</text>

  <!-- Other Rivers (subtle) -->
  <path d="M 350 200 Q 340 350 320 500" stroke="#4da6a6" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Georgetown (Capital) -->
  <circle cx="210" cy="200" r="6" fill="#d4a017"/>
  <text x="210" y="180" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Georgetown</text>
  <text x="210" y="192" font-family="Inter, sans-serif" font-size="10" fill="#b0b0b0" text-anchor="middle">(Capital)</text>

  <!-- Bartica (Port City) -->
  <circle cx="190" cy="280" r="5" fill="#d4a017"/>
  <text x="190" y="260" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Bartica</text>
  <text x="190" y="272" font-family="Inter, sans-serif" font-size="10" fill="#b0b0b0" text-anchor="middle">(Port)</text>

  <!-- Groete Gold Project Location -->
  <circle cx="260" cy="380" r="8" fill="#ffd700" stroke="#d4a017" stroke-width="2"/>
  <circle cx="260" cy="380" r="14" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <text x="260" y="360" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffd700" text-anchor="middle">Groete Gold</text>
  <text x="260" y="375" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffd700" text-anchor="middle">Copper Project</text>

  <!-- Distance Indicators -->
  <!-- Georgetown to Groete -->
  <line x1="210" y1="200" x2="260" y2="380" stroke="#d4a017" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="225" y="290" font-family="Inter, sans-serif" font-size="10" fill="#d4a017" opacity="0.7">~65 km</text>

  <!-- Bartica to Groete -->
  <line x1="190" y1="280" x2="260" y2="380" stroke="#d4a017" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="220" y="340" font-family="Inter, sans-serif" font-size="10" fill="#d4a017" opacity="0.7">~30 km</text>

  <!-- Deep Water Access Indicator -->
  <circle cx="185" cy="100" r="4" fill="#4da6a6"/>
  <text x="185" y="80" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4da6a6" text-anchor="middle">Deep Water Access</text>
  <path d="M 185 105 L 185 140" stroke="#4da6a6" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Legend -->
  <g transform="translate(20, 700)">
    <rect x="0" y="0" width="200" height="75" fill="rgba(0,0,0,0.3)" rx="8"/>
    <circle cx="15" cy="15" r="4" fill="#ffd700" stroke="#d4a017" stroke-width="1.5"/>
    <text x="30" y="19" font-family="Inter, sans-serif" font-size="11" fill="#ffffff">Groete Project</text>

    <circle cx="15" cy="35" r="3" fill="#d4a017"/>
    <text x="30" y="39" font-family="Inter, sans-serif" font-size="11" fill="#ffffff">Major Cities</text>

    <line x1="10" y1="55" x2="20" y2="55" stroke="#4da6a6" stroke-width="2"/>
    <text x="30" y="59" font-family="Inter, sans-serif" font-size="11" fill="#ffffff">Rivers</text>
  </g>

  <!-- Title -->
  <text x="300" y="40" font-family="Playfair Display, serif" font-size="20" font-weight="700" fill="#d4a017" text-anchor="middle">Guyana & Surrounding Region</text>
</svg>
